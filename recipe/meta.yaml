{% set name = "typedload" %}
{% set version = "2.38" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/typedload-{{ version }}.tar.gz
  sha256: 9ba540d8d9d56408569cee68d76a1edbbb71ea9e4a5464e667b876be7f20d164

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - typedload
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://ltworf.codeberg.page/typedload/
  summary: Load and dump data from json-like format into typed data structures
  license: GPL-3.0-or-later
  license_file: LICENSE
  dev_url: https://codeberg.org/ltworf/typedload

extra:
  recipe-maintainers:
    - HeavyTony2
